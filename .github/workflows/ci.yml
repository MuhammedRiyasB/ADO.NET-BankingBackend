name: ci

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  build-test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore BankingBackend.sln

      - name: Build
        run: dotnet build BankingBackend.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test BankingBackend.sln --configuration Release --no-build
